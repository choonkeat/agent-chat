<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Chat logs · agent-chat</title>
<link rel="stylesheet" href="./assets/viewer.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="./assets/viewer.js" defer></script>
</head>
<body class="archive">

<aside class="sidebar">
  <div class="brand">
    <h1>Chat logs</h1>
    <p class="subtitle">agent-chat exports</p>
  </div>
  <input type="search" id="filter" class="filter" placeholder="Filter…">
  <nav id="chat-list" class="chat-list" aria-label="Chats"></nav>
  <div class="footer-links">
    <a href="./assets/" target="_blank">browse assets/ →</a>
  </div>
</aside>

<main class="main">
  <header class="main-header">
    <div class="meta" id="current-meta">Pick a chat from the sidebar →</div>
    <div class="actions">
      <a id="raw-md-link" href="#" target="_blank" hidden>raw .md ↗</a>
    </div>
  </header>
  <div class="chat" id="chat-pane"></div>
</main>

<script>
// Manifest is maintained by the export tool. Newest first. Each new export
// prepends an entry on the line above the sentinel comment below.
const MANIFEST = [
  { md: './2026-07-22-02-strip-os-added-space-on-paste-into-autocomplete-trigger.md', date: '2026-07-22', idx: '02', title: 'Strip Os Added Space On Paste Into Autocomplete Trigger' },
  { md: './2026-07-22-01-untitled-d27b733c-9b17-42bb-89d9-e6b834c7397f.md', date: '2026-07-22', idx: '01', title: 'Untitled' },
  { md: './2026-07-19-01-focus-steal-on-reconnect-verify-fix.md', date: '2026-07-19', idx: '01', title: 'Focus Steal On Reconnect Verify Fix' },
  { md: './2026-07-18-03-untitled.md', date: '2026-07-18', idx: '03', title: 'Untitled' },
  { md: './2026-07-18-02-streaming-chatlog-0-8-14-release.md', date: '2026-07-18', idx: '02', title: 'Streaming Chatlog 0 8 14 Release' },
  { md: './2026-07-18-01-streaming-chatlog-auto-export.md', date: '2026-07-18', idx: '01', title: 'Streaming Chatlog Auto Export' },
  { md: './2026-07-12-02-timeout-fix-test-and-release.md', date: '2026-07-12', idx: '02', title: 'Timeout Fix Test And Release' },
  { md: './2026-07-12-01-idle-abort-reply-loss-fix.md', date: '2026-07-12', idx: '01', title: 'Idle Abort Reply Loss Fix' },
  { md: './2026-07-11-01-paste-to-upload.md', date: '2026-07-11', idx: '01', title: 'Paste To Upload' },
  { md: './2026-07-10-01-reconnect-scroll-and-ws-heartbeat.md', date: '2026-07-10', idx: '01', title: 'Reconnect Scroll And Ws Heartbeat' },
  { md: './2026-07-02-01-fork-menu-hide-on-progress-bubbles.md', date: '2026-07-02', idx: '01', title: 'Fork Menu Hide On Progress Bubbles' },
  { md: './2026-06-29-01-export-asset-sha-suffix.md', date: '2026-06-29', idx: '01', title: 'Export Asset Sha Suffix' },
  { md: './2026-06-28-02-worktree-fork-and-autocomplete-merge.md', date: '2026-06-28', idx: '02', title: 'Worktree Fork And Autocomplete Merge' },
  { md: './2026-06-28-01-per-bubble-fork-overflow-menu.md', date: '2026-06-28', idx: '01', title: 'Per Bubble Fork Overflow Menu' },
  { md: './2026-06-28-01-filepath-autocomplete-bfs-roots.md', date: '2026-06-28', idx: '01', title: 'Filepath Autocomplete Bfs Roots' },
  { md: './2026-06-27-01-parent-url-relative-links-and-autocomplete-fix.md', date: '2026-06-27', idx: '01', title: 'Parent Url Relative Links And Autocomplete Fix' },
  { md: './2026-06-13-01-chat-submit-ctrl-cmd-enter-autofocus-audit.md', date: '2026-06-13', idx: '01', title: 'Chat Submit Ctrl Cmd Enter Autofocus Audit' },
  { md: './2026-05-19-01-empty-queue-and-frozen-reply-fixes.md', date: '2026-05-19', idx: '01', title: 'Empty Queue And Frozen Reply Fixes' },
  { md: './2026-05-12-01-pending-bubble-and-unsend.md', date: '2026-05-12', idx: '01', title: 'Pending Bubble And Unsend' },
  { md: './2026-05-03-01-test-export-chat-feature.md', date: '2026-05-03', idx: '01', title: 'Test Export Chat Feature' },
  // === agent-chat:manifest-insert (newest first) ===
];

function renderList(filter) {
  const ul = document.getElementById('chat-list');
  ul.innerHTML = '';
  let lastDate = null;
  let visible = 0;
  for (const e of MANIFEST) {
    if (filter) {
      const hay = (e.title + ' ' + e.idx + ' ' + e.date).toLowerCase();
      if (!hay.includes(filter)) continue;
    }
    if (e.date !== lastDate) {
      const h = document.createElement('div');
      h.className = 'date-group';
      h.textContent = e.date;
      ul.appendChild(h);
      lastDate = e.date;
    }
    const link = document.createElement('a');
    link.href = '#' + encodeURIComponent(e.md);
    link.className = 'chat-link';
    link.dataset.md = e.md;
    link.innerHTML = `<span class="idx">${e.idx}</span><span class="title">${e.title}</span>`;
    link.addEventListener('click', evt => { evt.preventDefault(); selectChat(e); });
    ul.appendChild(link);
    visible++;
  }
  if (visible === 0) {
    const empty = document.createElement('div');
    empty.className = 'date-group';
    empty.style.color = '#5a5e6e';
    empty.textContent = MANIFEST.length === 0 ? 'No chats yet' : 'No matches';
    ul.appendChild(empty);
  }
}

async function selectChat(entry) {
  document.querySelectorAll('.chat-link').forEach(a => a.classList.toggle('active', a.dataset.md === entry.md));
  document.getElementById('current-meta').textContent = `${entry.date}-${entry.idx} · ${entry.title}`;
  document.title = `${entry.title} · Chat logs`;

  const rawMd = document.getElementById('raw-md-link');
  rawMd.href = entry.md;
  rawMd.hidden = false;

  await viewer.load(entry.md, document.getElementById('chat-pane'));
  history.replaceState(null, '', '#' + encodeURIComponent(entry.md));
}

document.getElementById('filter').addEventListener('input', e => {
  renderList(e.target.value.trim().toLowerCase());
});

window.addEventListener('DOMContentLoaded', () => {
  renderList('');
  const hash = decodeURIComponent(location.hash.slice(1));
  const target = MANIFEST.find(e => e.md === hash) || MANIFEST[0];
  if (target) selectChat(target);
});
</script>
</body>
</html>
